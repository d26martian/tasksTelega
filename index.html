<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Critical: Prevent zoom with maximum-scale=1 and user-scalable=no -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <!-- iOS specific: Prevent zoom on form elements -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Task Manager</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Prevent zoom on all devices */
    html {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }
    
    /* iOS: Prevent callout/copy-paste that can cause zoom */
    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* Allow text selection in inputs only */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
